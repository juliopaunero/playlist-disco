<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orden del Disco</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
  margin: 0;
  padding: 15px 15px 100px;
}

h1 {
  text-align: center;
  font-size: 22px;
}

p {
  text-align: center;
  color: gray;
  font-size: 14px;
}

img {
  width: 70%;
  max-width: 220px;
  display: block;
  margin: 10px auto;
  border-radius: 12px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: #222;
  margin: 10px 0;
  padding: 12px;
  border-radius: 12px;
}

.active {
  background: #1db954 !important;
}

.row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.handle {
  font-size: 18px;
  cursor: grab;
  color: #aaa;
}

.number {
  width: 25px;
  text-align: right;
  color: #ccc;
}

.title {
  font-size: 15px;
}

.duration {
  font-size: 12px;
  color: #aaa;
}

.play-btn {
  background: #1db954;
  border: none;
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
}

input {
  width: 100%;
  margin-top: 8px;
  padding: 7px;
  border-radius: 6px;
  border: none;
}

.controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}

.controls button {
  background: #444;
  border: none;
  color: white;
  padding: 12px;
  border-radius: 8px;
}

.player-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: #000;
  padding: 10px;
}

.player-bar audio {
  width: 100%;
}
</style>
</head>

<body>

<h1>Orden del Disco</h1>
<p>Arrastrar desde ≡ · Tocar para reproducir</p>

<img src="PEGAR_LINK_TAPA">

<ul id="playlist">

<li data-src="https://www.dropbox.com/scl/fi/m06at81vanme2w04vic1s/01-Caparazon.mp3?rlkey=dgw1n1c6kd2wh3wkc4mk7ggx5&st=zouaiycm&raw=1">
  <div class="row">
    <div class="left" onclick="playItem(this)">
      <span class="handle">≡</span>
      <span class="number">1</span>
      <span>
        <div class="title">Caparazón</div>
        <div class="duration">--:--</div>
      </span>
    </div>
    <button class="play-btn" onclick="play(this)">▶</button>
  </div>
  <input placeholder="Comentario">
</li>

<li data-src="https://www.dropbox.com/scl/fi/cdr3k0zn9qgsd4gfelpei/02-Intento-13042026.mp3?rlkey=3xxijxnob95m6ulxzaz0olbms&st=53mjo48k&raw=1">
  <div class="row">
    <div class="left" onclick="playItem(this)">
      <span class="handle">≡</span>
      <span class="number">2</span>
      <span>
        <div class="title">Intento</div>
        <div class="duration">--:--</div>
      </span>
    </div>
    <button class="play-btn" onclick="play(this)">▶</button>
  </div>
  <input placeholder="Comentario">
</li>

  <li data-src="https://www.dropbox.com/scl/fi/qiztpu2fpp9hd72wj3trf/03-Nada-es-lo-que-parece-032026-no-low.mp3?rlkey=edidpr7ptari7l85hq5mlxa70&st=ckkcsv92&raw=1">
  <div class="row">
    <div class="left" onclick="playItem(this)">
      <span class="handle">≡</span>
      <span class="number">2</span>
      <span>
        <div class="title">Nada es lo que parece</div>
        <div class="duration">--:--</div>
      </span>
    </div>
    <button class="play-btn" onclick="play(this)">▶</button>
  </div>
  <input placeholder="Comentario">
</li>

    <li data-src="https://www.dropbox.com/scl/fi/rurg7n63kgihmr20d307g/04-Sin-red.mp3?rlkey=qrzrvlpye20mvq1beufxd3d0m&st=9ao8p4c8&raw=1">
  <div class="row">
    <div class="left" onclick="playItem(this)">
      <span class="handle">≡</span>
      <span class="number">2</span>
      <span>
        <div class="title">Sin red</div>
        <div class="duration">--:--</div>
      </span>
    </div>
    <button class="play-btn" onclick="play(this)">▶</button>
  </div>
  <input placeholder="Comentario">
</li>


  
</ul>

<div class="controls">
  <button onclick="exportOrder()">Copiar orden</button>
  <button onclick="resetOrder()">Resetear</button>
</div>

<div class="player-bar">
  <audio id="player" controls></audio>
</div>

<script>
const player = document.getElementById("player");

/* PLAY */
function play(btn) {
  const li = btn.closest("li");
  activate(li);
}

function playItem(el) {
  const li = el.closest("li");
  activate(li);
}

function activate(li) {
  document.querySelectorAll("li").forEach(el => el.classList.remove("active"));
  li.classList.add("active");

  player.src = li.getAttribute("data-src");
  player.play();
}

/* AUTOPLAY */
player.addEventListener("ended", () => {
  const current = document.querySelector(".active");
  if (!current) return;
  const next = current.nextElementSibling;
  if (next) activate(next);
});

/* NUMERACIÓN */
function updateNumbers() {
  document.querySelectorAll("#playlist li").forEach((item, i) => {
    item.querySelector(".number").textContent = i + 1;
  });
}

/* GUARDAR */
function saveOrder() {
  const order = [...document.querySelectorAll("#playlist li")]
    .map(li => li.getAttribute("data-src"));
  localStorage.setItem("ordenPlaylist", JSON.stringify(order));
}

/* CARGAR */
function loadOrder() {
  const saved = JSON.parse(localStorage.getItem("ordenPlaylist"));
  if (!saved) return;

  const list = document.getElementById("playlist");
  const items = [...list.children];

  saved.forEach(src => {
    const item = items.find(li => li.getAttribute("data-src") === src);
    if (item) list.appendChild(item);
  });
}

/* EXPORTAR */
function exportOrder() {
  let text = "Orden del disco:\n";
  document.querySelectorAll("#playlist li").forEach((item, i) => {
    const title = item.querySelector(".title").textContent;
    text += (i+1) + ". " + title + "\n";
  });
  navigator.clipboard.writeText(text);
  alert("Orden copiado");
}

/* RESET */
function resetOrder() {
  localStorage.removeItem("ordenPlaylist");
  location.reload();
}

/* DRAG */
new Sortable(document.getElementById("playlist"), {
  animation: 150,
  handle: ".handle",
  onEnd: () => {
    updateNumbers();
    saveOrder();
  }
});

/* FORMATEAR TIEMPO */
function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return m + ":" + (s < 10 ? "0" + s : s);
}

/* CARGAR DURACIONES */
function loadDurations() {
  document.querySelectorAll("#playlist li").forEach(li => {
    const audio = new Audio(li.getAttribute("data-src"));

    audio.addEventListener("loadedmetadata", () => {
      const duration = li.querySelector(".duration");
      duration.textContent = formatTime(audio.duration);
    });
  });
}

window.onload = () => {
  loadOrder();
  updateNumbers();
  loadDurations();
};
</script>

</body>
</html>
