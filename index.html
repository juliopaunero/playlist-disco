<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Orden del Disco</title>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
    }

    p {
      text-align: center;
      color: gray;
      margin-bottom: 20px;
    }

    img {
      width: 200px;
      display: block;
      margin: 10px auto;
      border-radius: 12px;
    }

    ul {
      list-style: none;
      padding: 0;
      max-width: 600px;
      margin: auto;
    }

    li {
      background: #222;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      cursor: grab;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .active {
      background: #1db954 !important;
    }

    button {
      background: #1db954;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #1ed760;
    }

    input {
      width: 100%;
      margin-top: 5px;
      padding: 5px;
      border-radius: 5px;
      border: none;
    }

    #player {
      display: block;
      margin: 20px auto;
      width: 100%;
      max-width: 600px;
    }

    .controls {
      text-align: center;
      margin-top: 10px;
    }

    .controls button {
      margin: 5px;
      background: #444;
    }
  </style>
</head>

<body>

<h1>Orden del Disco</h1>
<p>Arrastrar para reordenar · Escuchar de corrido</p>

<!-- 🎨 PORTADA -->
<img src="PEGAR_LINK_TAPA">

<ul id="playlist">

  <li data-src="https://www.dropbox.com/scl/fi/m06at81vanme2w04vic1s/01-Caparazon.mp3?rlkey=dgw1n1c6kd2wh3wkc4mk7ggx5&st=zouaiycm&raw=1">
    Caparazón
    <button onclick="play(this)">▶</button>
  </li>

  <li data-src="https://www.dropbox.com/scl/fi/cdr3k0zn9qgsd4gfelpei/02-Intento-13042026.mp3?rlkey=3xxijxnob95m6ulxzaz0olbms&st=53mjo48k&raw=1">
    Intento
    <button onclick="play(this)">▶</button>
  </li>

  <li data-src="https://www.dropbox.com/scl/fi/qiztpu2fpp9hd72wj3trf/03-Nada-es-lo-que-parece-032026-no-low.mp3?rlkey=edidpr7ptari7l85hq5mlxa70&st=ckkcsv92&raw=1">
    Nada es lo que parece
    <button onclick="play(this)">▶</button>
  </li>
  <li data-src="https://www.dropbox.com/scl/fi/rurg7n63kgihmr20d307g/04-Sin-red.mp3?rlkey=qrzrvlpye20mvq1beufxd3d0m&st=9ao8p4c8&raw=1">
    Sin red
    <button onclick="play(this)">▶</button>
  </li>
  <li data-src="https://www.dropbox.com/scl/fi/g98f3t0rf8psgi9qekaho/05-Me-cuesta-pensar-en-vos-13042026.mp3?rlkey=gtw1n3ilc0s99sabk3y6lxkr1&st=ht7j7h3f&raw=1">
    Me cuesta pensar en vos
    <button onclick="play(this)">▶</button>
  </li>
  <li data-src="https://www.dropbox.com/scl/fi/3lzqt230us6y7uujj8nqs/06-Amigo-Primavera.mp3?rlkey=koe4m07weh9oxdlok9y5b7frf&st=rtrl8hdd&raw=1">
    Amigo primavera
    <button onclick="play(this)">▶</button>
  </li>
  <li data-src="https://www.dropbox.com/scl/fi/sf18y19zoxsblpoo3cn9y/07-El-camino.mp3?rlkey=z8bbvccu18zl7j7f8g5tiisu8&st=4v3whp47&raw=1">
    El camino
    <button onclick="play(this)">▶</button>
  </li>
  <li data-src="https://www.dropbox.com/scl/fi/3pf92qrda8hrpcdj2rcp5/08-FARO-v3.mp3?rlkey=kmxrstg8wuuutq8fq5f5rc020&st=ibsdisk6&raw=1">
    Faro
    <button onclick="play(this)">▶</button>
  </li>
  <li data-src="https://www.dropbox.com/scl/fi/ohnrs45i92o5dxowp6wc5/09-COMO-ESTAS-VOS.mp3?rlkey=jiekkjvn5p1nixkzdaxcm4gdz&st=y9bvt1pw&raw=1">
    Cómo estás vos
    <button onclick="play(this)">▶</button>
  </li>

</ul>

<audio id="player" controls></audio>

<div class="controls">
  <button onclick="exportOrder()">Copiar orden</button>
  <button onclick="resetOrder()">Resetear</button>
</div>

<script>
  const player = document.getElementById("player");

  function play(btn) {
    const li = btn.closest("li");

    document.querySelectorAll("li").forEach(el => el.classList.remove("active"));
    li.classList.add("active");

    player.src = li.getAttribute("data-src");
    player.play();
  }

  player.addEventListener("ended", () => {
    const current = document.querySelector(".active");
    if (!current) return;

    const next = current.nextElementSibling;
    if (next) {
      next.querySelector("button").click();
    }
  });

  function updateNumbers() {
    const items = document.querySelectorAll("#playlist li");
    items.forEach((item, i) => {
      const title = item.querySelector(".title");
      title.textContent = (i + 1) + ". " + title.textContent.replace(/^\d+\.\s/, '');
    });
  }

  function saveOrder() {
    const order = [...document.querySelectorAll("#playlist li")]
      .map(li => li.getAttribute("data-src"));

    localStorage.setItem("ordenPlaylist", JSON.stringify(order));
  }

  function loadOrder() {
    const saved = JSON.parse(localStorage.getItem("ordenPlaylist"));
    if (!saved) return;

    const list = document.getElementById("playlist");
    const items = [...list.children];

    saved.forEach(src => {
      const item = items.find(li => li.getAttribute("data-src") === src);
      if (item) list.appendChild(item);
    });
  }

  function exportOrder() {
    const items = document.querySelectorAll("#playlist li");
    let text = "Orden del disco:\n";

    items.forEach((item, index) => {
      const title = item.querySelector(".title").textContent.replace(/^\d+\.\s/, '');
      text += (index + 1) + ". " + title + "\n";
    });

    navigator.clipboard.writeText(text);
    alert("Orden copiado");
  }

  function resetOrder() {
    localStorage.removeItem("ordenPlaylist");
    location.reload();
  }

  new Sortable(document.getElementById("playlist"), {
    animation: 150,
    onEnd: () => {
      updateNumbers();
      saveOrder();
    }
  });

  window.onload = () => {
    loadOrder();
    updateNumbers();
  };
</script>

</body>
</html>
